<div class="auth-card">
  <div class="auth-header">
    <div class="auth-logo">🏨</div>
    <h1>Welcome Back</h1>
    <p>Sign in to continue to your HotelPro dashboard.</p>
  </div>

  <form class="auth-form" novalidate ng-submit="login()">
    <div class="form-group">
      <label>Email</label>
      <input type="email" ng-model="authForm.email" placeholder="admin@hotelpro.com" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" ng-model="authForm.password" placeholder="Enter your password" required>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary full-width">Login</button>
    </div>

    <div class="auth-note">
      Don’t have an account? <a href="#!/signup">Create one</a>
    </div>

    <div class="alert alert-error" ng-if="authError">{{authError}}</div>
    <div class="alert alert-success" ng-if="authSuccess">{{authSuccess}}</div>
  </form>
</div>
