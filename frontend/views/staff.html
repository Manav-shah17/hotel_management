<!-- frontend/views/staff.html -->
<div>
  <div class="alert alert-success" ng-if="alertMsg && alertType === 'success'">✅ {{alertMsg}}</div>
  <div class="alert alert-error" ng-if="alertMsg && alertType === 'error'">❌ {{alertMsg}}</div>

  <div class="card">
    <div class="card-header">
      <h3>Staff Members ({{filteredStaff().length}})</h3>
      <div style="display:flex;gap:10px;align-items:center;">
        <div class="search-bar">
          <span>🔍</span>
          <input type="text" ng-model="searchText" placeholder="Search staff...">
        </div>
        <button class="btn btn-primary" ng-click="openAdd()">+ Add Staff</button>
      </div>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Hotel</th>
            <th>Role</th>
            <th>Department</th>
            <th>Salary</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr ng-repeat="s in filteredStaff()">
            <td>#{{s.staff_id}}</td>
            <td><strong style="color:var(--text-primary)">{{s.full_name}}</strong></td>
            <td>{{s.hotel_name}}</td>
            <td><span class="badge badge-blue">{{s.role}}</span></td>
            <td>{{s.department}}</td>
            <td>{{formatCurrency(s.salary)}}</td>
            <td>
              <div style="display:flex;gap:6px;">
                <button class="btn btn-outline btn-sm" ng-click="openEdit(s)">✏️ Edit</button>
                <button class="btn btn-danger btn-sm" ng-click="delete(s.staff_id)">🗑️</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="empty-state" ng-if="filteredStaff().length === 0">
        <div class="empty-icon">👥</div>
        <p>No staff found</p>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" ng-class="{hidden: !showModal}">
    <div class="modal">
      <div class="modal-header">
        <h3>{{editMode ? 'Edit Staff' : 'Add New Staff'}}</h3>
        <button class="modal-close" ng-click="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group full">
            <label>Full Name *</label>
            <input type="text" ng-model="formData.full_name" placeholder="e.g. Suresh Kumar" required>
          </div>
          <div class="form-group">
            <label>Hotel *</label>
            <select ng-model="formData.hotel_id" required>
              <option value="">-- Select Hotel --</option>
              <option ng-repeat="h in hotels" value="{{h.hotel_id}}">{{h.name}}</option>
            </select>
          </div>
          <div class="form-group">
            <label>Role</label>
            <input type="text" ng-model="formData.role" placeholder="e.g. Manager">
          </div>
          <div class="form-group">
            <label>Department</label>
            <input type="text" ng-model="formData.department" placeholder="e.g. Front Desk">
          </div>
          <div class="form-group">
            <label>Salary (₹)</label>
            <input type="number" ng-model="formData.salary" placeholder="e.g. 35000">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-outline" ng-click="closeModal()">Cancel</button>
          <button class="btn btn-primary" ng-click="save()">{{editMode ? 'Update Staff' : 'Add Staff'}}</button>
        </div>
      </div>
    </div>
  </div>
</div>
