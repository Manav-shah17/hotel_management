<div class="auth-card">
  <div class="auth-header">
    <div class="auth-logo">🏨</div>
    <h1>Create Account</h1>
    <p>Sign up and start managing your hotel dashboard.</p>
  </div>

  <form class="auth-form" novalidate ng-submit="signup()">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" ng-model="authForm.name" placeholder="Your full name" required>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" ng-model="authForm.email" placeholder="admin@hotelpro.com" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" ng-model="authForm.password" placeholder="Create a password" required>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary full-width">Sign Up</button>
    </div>

    <div class="auth-note">
      Already have an account? <a href="#!/login">Sign in</a>
    </div>

    <div class="alert alert-error" ng-if="authError">{{authError}}</div>
    <div class="alert alert-success" ng-if="authSuccess">{{authSuccess}}</div>
  </form>
</div>
